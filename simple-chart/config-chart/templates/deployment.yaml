apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-test
spec:
  selector:
    matchLabels:
      app: drift-test
  strategy:
    type: RollingUpdate
    rollingUpdate: ~        # explicit null — Helm v4 style: server defaults this to {maxSurge: 25%, maxUnavailable: 25%}
  template:
    metadata:
      labels:
        app: drift-test
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
